<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DailyFit — Personalised Daily Exercise Plan</title>
<meta name="description" content="Free daily exercise plans for gym or home, tailored to your gender, age and health conditions. Streaks, badges, rest timer, water & protein tracker, weight log. English & Hindi." />
<meta name="theme-color" content="#5b8cff" />
<link rel="apple-touch-icon" href="icon-180.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="DailyFit" />
<style>
  :root{
    --bg:#0f1226; --card:#1a1f3a; --card2:#232a4d; --ink:#e9ecf6; --mut:#9aa3c4;
    --accent:#5b8cff; --accent2:#37d6a6; --warn:#ffb23e; --danger:#ff6b81; --line:#2c3460;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,Arial,sans-serif;background:
    radial-gradient(1200px 600px at 10% -10%,#21285a 0,transparent 60%),
    radial-gradient(1000px 500px at 110% 10%,#13324a 0,transparent 55%),var(--bg);
    color:var(--ink);min-height:100vh}
  .wrap{max-width:1000px;margin:0 auto;padding:24px 16px 90px}
  header h1{margin:0;font-size:30px;letter-spacing:.3px}
  header p{margin:6px 0 0;color:var(--mut)}
  .badge{display:inline-block;background:var(--card2);border:1px solid var(--line);
    color:var(--accent2);font-size:12px;padding:3px 10px;border-radius:999px;margin-top:10px}
  .topbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px}
  .stat{background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700}
  .langbtn{margin-left:auto;cursor:pointer;background:#10142e;border:1px solid var(--accent);color:var(--ink);
    border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
  label{display:block;font-size:13px;color:var(--mut);margin-bottom:6px;font-weight:600}
  input,select{width:100%;padding:11px 12px;background:#10142e;border:1px solid var(--line);
    border-radius:10px;color:var(--ink);font-size:15px}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{user-select:none;cursor:pointer;padding:8px 12px;border-radius:999px;border:1px solid var(--line);
    background:#10142e;color:var(--ink);font-size:13px;transition:.15s}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn{cursor:pointer;border:none;border-radius:12px;padding:13px 22px;font-size:16px;font-weight:700;
    background:linear-gradient(120deg,var(--accent),#7aa2ff);color:#fff;margin-top:8px}
  .btn:hover{filter:brightness(1.07)}
  .btn.sm{padding:9px 15px;font-size:13px;margin-top:0}
  .btn.green{background:linear-gradient(120deg,#37d6a6,#23b98c)}
  .btn.wa{background:linear-gradient(120deg,#25d366,#1aa851)}
  .btn.ghost{background:#10142e;border:1px solid var(--line);color:var(--ink)}
  .shareRow{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:14px}
  .tabs{display:flex;gap:6px;margin-top:6px}
  .tab{flex:1;text-align:center;cursor:pointer;padding:11px 4px;border-radius:12px;border:1px solid var(--line);
    background:#10142e;font-weight:700;color:var(--mut);font-size:13px}
  .tab.on{background:var(--card2);color:var(--ink);border-color:var(--accent)}
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);margin:18px 0 8px}
  .ex{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;
    border:1px solid var(--line);border-radius:12px;background:var(--card2);margin-bottom:10px}
  .ex.done{opacity:.55}
  .ex.done h4{text-decoration:line-through}
  .cbx{flex:none;width:26px;height:26px;border-radius:8px;border:2px solid var(--accent);background:transparent;
    cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;margin-top:2px}
  .cbx.on{background:var(--accent2);border-color:var(--accent2)}
  .ex .body{flex:1;min-width:0}
  .ex h4{margin:0 0 3px;font-size:16px;cursor:pointer}
  .ex small{color:var(--mut);display:block;line-height:1.45}
  .ex .tip{display:none;margin-top:7px;font-size:13px;color:#cfd6f5;background:#10142e;border:1px solid var(--line);
    border-radius:9px;padding:8px 10px;line-height:1.5}
  .ex .tip.open{display:block}
  .ex .dose{white-space:nowrap;font-weight:800;color:var(--accent);font-size:14px;text-align:right;flex:none}
  .progress{height:10px;border-radius:999px;background:#10142e;border:1px solid var(--line);overflow:hidden;margin:6px 0 4px}
  .progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s}
  .planhead{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
  .planhead .cnt{font-size:13px;color:var(--mut);font-weight:700}
  .note{display:flex;gap:10px;padding:12px 14px;border-radius:12px;margin-bottom:10px;font-size:14px;line-height:1.5}
  .note.warn{background:rgba(255,178,62,.12);border:1px solid rgba(255,178,62,.4);color:#ffd89a}
  .note.info{background:rgba(91,140,255,.12);border:1px solid rgba(91,140,255,.4);color:#bcd0ff}
  .note.danger{background:rgba(255,107,129,.12);border:1px solid rgba(255,107,129,.45);color:#ffc2cc}
  .summary{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
  .pill{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px}
  .pill b{color:var(--ink)}
  .pill.big{background:linear-gradient(120deg,#1c2348,#26305c)}
  .week{display:flex;flex-direction:column;gap:10px}
  .wday{border:1px solid var(--line);border-radius:12px;padding:12px 14px;background:var(--card2)}
  .wday.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .wday.rest{background:#161b35}
  .wday h4{margin:0 0 4px;font-size:15px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .wday .focus{color:var(--accent2);font-weight:700;font-size:13px}
  .wday ul{margin:8px 0 0;padding-left:18px;color:var(--mut);font-size:13px;line-height:1.6}
  /* Me tab */
  .subcard{border:1px solid var(--line);border-radius:14px;padding:16px;margin-top:14px;background:var(--card2)}
  .subcard h3{margin:0 0 10px;font-size:16px}
  .badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
  .bg{border:1px solid var(--line);border-radius:12px;padding:10px 6px;text-align:center;background:#10142e;opacity:.4}
  .bg.earned{opacity:1;background:linear-gradient(120deg,#1c2348,#243a55);border-color:var(--accent2)}
  .bg .em{font-size:26px}
  .bg .nm{font-size:11px;font-weight:700;margin-top:4px;line-height:1.2}
  .counter{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .counter .num{font-size:30px;font-weight:800;min-width:120px}
  .counter button{cursor:pointer;border:none;border-radius:10px;width:44px;height:44px;font-size:22px;font-weight:800;
    background:var(--accent);color:#fff}
  .counter button.minus{background:#36406e}
  .glassbar{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
  .glass{font-size:22px;opacity:.3}
  .glass.full{opacity:1}
  .hidden{display:none}
  .foot{color:var(--mut);font-size:12px;margin-top:22px;line-height:1.6}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#23b98c;color:#fff;
    padding:12px 18px;border-radius:12px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.35);opacity:0;
    transition:.25s;pointer-events:none;z-index:60;text-align:center;max-width:90%}
  .toast.show{opacity:1}
  .fab{position:fixed;right:18px;bottom:22px;z-index:55;border:none;cursor:pointer;border-radius:999px;
    padding:14px 18px;font-size:15px;font-weight:800;color:#fff;background:linear-gradient(120deg,var(--accent),#7aa2ff);
    box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .timerCard{position:fixed;right:18px;bottom:80px;z-index:56;background:var(--card);border:1px solid var(--line);
    border-radius:16px;padding:16px;width:210px;box-shadow:0 12px 36px rgba(0,0,0,.5);text-align:center;display:none}
  .timerCard.open{display:block}
  .timerCard .big{font-size:42px;font-weight:800;letter-spacing:1px;margin:4px 0 10px}
  .timerCard .row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .timerCard button{cursor:pointer;border:none;border-radius:10px;padding:9px 12px;font-weight:700;font-size:13px}
  @media print{
    body{background:#fff;color:#000}
    .card,.ex,.wday,.subcard{box-shadow:none;background:#fff !important;border-color:#ccc}
    .ex .tip{display:block !important}
    #inputCard,.topbar,.shareRow,.tabs,.fab,.timerCard,.toast,.badge,.planhead .right,.cbx{display:none !important}
    .ex{opacity:1 !important}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🏋️ DailyFit</h1>
    <p id="tagline"></p>
    <span class="badge" id="badgeLine"></span>
    <div class="topbar">
      <span class="stat" id="streakStat"></span>
      <span class="stat" id="totalStat"></span>
      <button class="langbtn" id="langBtn"></button>
    </div>
    <div class="shareRow">
      <button class="btn green sm" id="shareBtn"></button>
      <button class="btn wa sm" id="waBtn">WhatsApp</button>
    </div>
  </header>

  <!-- INPUT -->
  <div class="card" id="inputCard">
    <div class="grid">
      <div><label id="lblGender"></label>
        <select id="gender"><option value="male"></option><option value="female"></option><option value="other"></option></select></div>
      <div><label id="lblAge"></label><input id="age" type="number" min="10" max="100" value="30" /></div>
      <div><label id="lblGoal"></label>
        <select id="goal"><option value="general"></option><option value="fatloss"></option><option value="muscle"></option><option value="mobility"></option></select></div>
      <div><label id="lblExp"></label>
        <select id="level"><option value="beginner"></option><option value="intermediate"></option><option value="advanced"></option></select></div>
      <div><label id="lblHeight"></label><input id="height" type="number" min="100" max="230" placeholder="e.g. 170" /></div>
      <div><label id="lblWeight"></label><input id="weight" type="number" min="30" max="250" placeholder="e.g. 70" /></div>
    </div>
    <div style="margin-top:18px">
      <label id="lblConditions"></label>
      <div class="chips" id="conditions">
        <span class="chip on" data-c="none"></span>
        <span class="chip" data-c="back"></span>
        <span class="chip" data-c="knee"></span>
        <span class="chip" data-c="heart"></span>
        <span class="chip" data-c="diabetes"></span>
        <span class="chip" data-c="obese"></span>
        <span class="chip" data-c="asthma"></span>
        <span class="chip" data-c="pregnancy"></span>
      </div>
    </div>
    <button class="btn" id="go"></button>
  </div>

  <!-- OUTPUT -->
  <div id="output" class="hidden">
    <div class="card">
      <div class="summary" id="summary"></div>
      <div id="globalNotes" style="margin-top:14px"></div>
      <div class="shareRow" style="margin-top:16px">
        <button class="btn ghost sm" id="editBtn"></button>
        <button class="btn green sm" id="sharePlanBtn"></button>
        <button class="btn ghost sm" id="printBtn"></button>
      </div>
      <div class="tabs" style="margin-top:16px">
        <div class="tab on" data-tab="gym"></div>
        <div class="tab" data-tab="home"></div>
        <div class="tab" data-tab="week"></div>
        <div class="tab" data-tab="me"></div>
      </div>
      <div id="planGym"></div>
      <div id="planHome" class="hidden"></div>
      <div id="planWeek" class="hidden"></div>
      <div id="planMe" class="hidden"></div>
    </div>
  </div>

  <div class="foot" id="disclaimer"></div>
</div>

<!-- Rest timer -->
<div class="timerCard" id="timerCard">
  <div style="font-size:13px;color:var(--mut);font-weight:700" id="tTitle"></div>
  <div class="big" id="timerDisplay">1:00</div>
  <div class="row">
    <button class="btn green sm" id="tStart" style="margin:0"></button>
    <button class="btn ghost sm" id="tReset" style="margin:0"></button>
  </div>
  <div class="row" style="margin-top:8px">
    <button class="btn ghost sm" id="tMinus" style="margin:0">−15s</button>
    <button class="btn ghost sm" id="tPlus" style="margin:0">+15s</button>
  </div>
</div>
<button class="fab" id="timerFab"></button>
<div class="toast" id="toast"></div>

};
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function exKey(where,name){ return where+"|"+name; }

/* ===================== Streak / completion ===================== */
function doneMap(){ return LS.get("df_done",{}); }
function isDone(where,name){ const m=doneMap()[todayStr()]||{}; return !!m[exKey(where,name)]; }
function toggleDone(where,name,val){
  const all=doneMap(); const t=todayStr(); all[t]=all[t]||{};
  if(val){ all[t][exKey(where,name)]=true; } else { delete all[t][exKey(where,name)]; }
  if(Object.keys(all[t]).length===0) delete all[t];
  LS.set("df_done",all); refreshStats();
}
function activeDates(){ const m=doneMap(); return new Set(Object.keys(m).filter(d=>Object.keys(m[d]).length>0)); }
function computeStreak(){
  const set=activeDates(); if(set.size===0) return 0;
  const d=new Date(); d.setHours(0,0,0,0);
  const fmt=x=>x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");
  if(!set.has(fmt(d))) d.setDate(d.getDate()-1);
  let n=0; while(set.has(fmt(d))){ n++; d.setDate(d.getDate()-1); } return n;
}
function totalWorkouts(){ return activeDates().size; }
function refreshStats(){
  $("streakStat").textContent="🔥 "+computeStreak()+(lang==="hi"?"-दिन स्ट्रीक":"-day streak");
  const t=totalWorkouts();
  $("totalStat").textContent="🏅 "+t+(lang==="hi"?(" वर्कआउट"):(" workout"+(t===1?"":"s")));
}

/* ===================== Plan building ===================== */
function ageBand(a){ if(a<18)return"teen"; if(a<40)return"adult"; if(a<60)return"middle"; return"senior"; }
function daySeed(){ const d=new Date(); return d.getFullYear()*1000+Math.floor((d-new Date(d.getFullYear(),0,0))/864e5); }
function rotate(arr,off){ if(arr.length===0)return arr; const o=((off%arr.length)+arr.length)%arr.length; return arr.slice(o).concat(arr.slice(0,o)); }
function maxIntFor(o){ if(o.conds.includes("heart")||o.conds.includes("pregnancy"))return 1;
  if(o.band==="senior"||o.conds.includes("knee")||o.conds.includes("obese")||o.conds.includes("asthma"))return 2; return 3; }
function pool(grp,where,o,seedExtra){
  let p=LIB.filter(x=>x.grp===grp && (x.where===where||x.where==="both"))
          .filter(x=>!x.avoid.some(a=>o.conds.includes(a))).filter(x=>x.int<=maxIntFor(o));
  return rotate(p, daySeed()+grp.length+(seedExtra||0));
}
function buildPlan(where,o){
  const coreN=o.band==="senior"?1:2; let cardioN=o.goal==="fatloss"?2:1; if(o.band==="senior")cardioN=1;
  const pick=(g,n)=>pool(g,where,o,0).slice(0,n);
  return {warmup:pick("warmup",3),lower:pick("lower",2),upper:pick("upper",o.goal==="muscle"?3:2),
          core:pick("core",coreN),cardio:pick("cardio",cardioN),cool:pick("cool",3)};
}
function estMinutes(x){ const d=x.dose;
  if(/min/.test(d)) return parseFloat(d)||5;
  let m=d.match(/(\d+)×(\d+)(s?)/); if(m){ const sets=+m[1],reps=+m[2],sec=m[3]==="s"; const work=sec?reps:reps*3; return Math.round((sets*(work+45))/60*10)/10; }
  if(/s\b/.test(d)) return 1; return 1.5; }
function estimate(plan,w){ w=w||70; const met={warmup:3.5,lower:5,upper:4,core:3.5,cool:2.5}; let mins=0,kcal=0;
  for(const g of Object.keys(plan)) for(const x of plan[g]){ const t=estMinutes(x);
    const m=g==="cardio"?(x.int===1?4:x.int===2?6.5:9):(met[g]||4); mins+=t; kcal+=m*w*(t/60); }
  mins=Math.round(mins); kcal=Math.round(kcal/5)*5;
  return {mins,kcalLow:Math.round(kcal*0.85/5)*5,kcalHigh:Math.round(kcal*1.15/5)*5}; }

function exName(x){ return lang==="hi"?x.nh:x.n; }
function exTip(x){ return lang==="hi"?x.tiph:x.tip; }
function exMus(x){ return lang==="hi"?x.mush:x.mus; }
function exRow(x,where){
  const done=isDone(where,x.n);

    <div class="cbx${done?' on':''}" data-act="toggle">${done?'✓':''}</div>

      <div class="tip">💡 ${exTip(x)}</div>
    </div>

}
function block(grp,arr,where){ if(!arr.length)return""; return `<div class="section-title">${T("secTitles")[grp]}</div>`+arr.map(x=>exRow(x,where)).join(""); }
function flatten(p){ return [].concat(p.warmup,p.lower,p.upper,p.core,p.cardio,p.cool); }
function renderPlan(plan,where,est){
  const items=flatten(plan); const dc=items.filter(x=>isDone(where,x.n)).length;
  const pct=items.length?Math.round(dc/items.length*100):0;
  return `<div class="planhead">
      <div><b>${where==="gym"?T("gymWorkout"):T("homeWorkout")}</b> <span class="cnt">· ~${est.mins} ${T("min")} · ~${est.kcalLow}-${est.kcalHigh} kcal</span></div>
      <div class="right"><button class="btn ghost sm" data-act="markall" data-where="${where}">${T("markAll")}</button>
      <button class="btn ghost sm" data-act="reset" data-where="${where}">${T("reset")}</button></div></div>
    <div class="progress"><div id="bar-${where}" style="width:${pct}%"></div></div>
    <div class="cnt" id="cnt-${where}" style="margin-bottom:8px">${dc}/${items.length} ${T("done")}${pct===100?'  '+T("complete"):''}</div>`
    + block("warmup",plan.warmup,where)+block("lower",plan.lower,where)+block("upper",plan.upper,where)
    + block("core",plan.core,where)+block("cardio",plan.cardio,where)+block("cool",plan.cool,where);
}
function updateProgress(where){
  const plan=where==="gym"?lastOpts._gym:lastOpts._home; const items=flatten(plan);
  const dc=items.filter(x=>isDone(where,x.n)).length; const pct=items.length?Math.round(dc/items.length*100):0;
  const bar=$("bar-"+where),cnt=$("cnt-"+where); if(bar)bar.style.width=pct+"%";
  if(cnt)cnt.textContent=dc+"/"+items.length+" "+T("done")+(pct===100?'  '+T("complete"):'');

/* weekly split */
function weeklyTemplate(goal){
  if(goal==="muscle")return ["upper","lower","restwalk","upper","lower","cardiocore","rest"];
  if(goal==="mobility")return ["mobcore","cardioeasy","restwalk","full","mobcore","cardioeasy","rest"];
  return ["full","cardiocore","restwalk","upper","lower","cardio","rest"];
}
function groupsForFocus(k){
  if(k==="upper")return["upper","upper","core"]; if(k==="lower")return["lower","lower","core"];
  if(k==="full")return["lower","upper","core"]; if(k==="cardiocore")return["cardio","core","cool"];
  if(k==="cardio"||k==="cardioeasy")return["cardio","cardio","cool"]; if(k==="mobcore")return["warmup","cool","core"];
  return [];
}
function renderWeek(where,o){
  const todayIdx=(new Date().getDay()+6)%7; const tmpl=weeklyTemplate(o.goal);
  let html=`<div class="cnt" style="margin:6px 0 12px">${T("weekIntro")(where==="gym"?T("forTheGym"):T("forHome"))}</div><div class="week">`;
  for(let i=0;i<7;i++){ const k=tmpl[i]; const rest=(k==="rest"||k==="restwalk"); let moves="";
    if(!rest){ const gs=groupsForFocus(k); const picked=[]; const seen=new Set();
      gs.forEach((g,j)=>{ const p=pool(g,where,o,i*7+j); for(const x of p){ if(!seen.has(x.n)){ seen.add(x.n); picked.push(x); break; } } });
      moves="<ul>"+picked.map(x=>`<li>${exName(x)} <span style="color:var(--accent)">${x.dose}</span></li>`).join("")+"</ul>"; }
    else moves=`<ul><li>${T("restText")}</li></ul>`;
    html+=`<div class="wday${i===todayIdx?' today':''}${rest?' rest':''}">
      <h4><span>${T("days")[i]}${i===todayIdx?' · '+T("today"):''}</span> <span class="focus">${rest?T("restDay"):T("focus")[k]}</span></h4>${moves}</div>`; }
  return html+"</div>";
}

    <div class="cnt">${T("waterSub")(wTarget)}</div>

      <div class="num"><span id="waterNum">${water}</span> / ${wTarget} <span style="font-size:14px;color:var(--mut)">${T("glasses")}</span></div>
      <button data-act="water" data-d="1">+</button></div>
    <div class="glassbar" id="glassbar">${glasses}</div></div>`;

  // protein
  const pTarget=wt?Math.round(wt*1.6/5)*5:0; const prot=LS.get("df_protein",{})[todayStr()]||0;
  const protCard=`<div class="subcard"><h3>${T("meProtein")}</h3>
    <div class="cnt">${T("proteinSub")(pTarget)}</div>
    <div class="counter" style="margin-top:8px"><button class="minus" data-act="protein" data-d="-10">−10</button>
      <div class="num"><span id="protNum">${prot}</span>${pTarget?(" / "+pTarget):""} <span style="font-size:14px;color:var(--mut)">${T("grams")}</span></div>
      <button data-act="protein" data-d="10">+10</button></div></div>`;

  return badges+weight+waterCard+protCard;
}
function weightSVG(w){
  const data=w.slice(-14); const W=300,H=90,pad=6;
  const ys=data.map(d=>d.kg); const min=Math.min(...ys),max=Math.max(...ys); const rng=(max-min)||1;
  const pts=data.map((d,i)=>{ const x=pad+(data.length===1?W/2:(i*(W-2*pad)/(data.length-1)));
    const y=H-pad-((d.kg-min)/rng)*(H-2*pad); return x.toFixed(1)+","+y.toFixed(1); });
  const poly=`<polyline fill="none" stroke="#5b8cff" stroke-width="2.5" points="${pts.join(" ")}"/>`;
  const dots=pts.map(p=>`<circle cx="${p.split(",")[0]}" cy="${p.split(",")[1]}" r="3" fill="#37d6a6"/>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="90" style="background:#10142e;border:1px solid var(--line);border-radius:10px">${poly}${dots}</svg>`;
}

    `<div class="pill">${T("pLevel")} <b>${o.level}</b></div>`+
    `<div class="pill">${T("pCond")} <b>${o.conds.length?o.conds.map(c=>T("condShort")[c]).join(", "):T("pNone")}</b></div>`;
  if(o.height&&o.weight){ const bmi=o.weight/Math.pow(o.height/100,2);
    const cat=bmi<18.5?T("bmiCat").u:bmi<25?T("bmiCat").h:bmi<30?T("bmiCat").o:T("bmiCat").ob;
    pills+=`<div class="pill big">BMI <b>${bmi.toFixed(1)}</b> · ${cat}</div>`; }
  $("summary").innerHTML=pills;
  let notes=`<div class="note info">${T("noteMain")}</div>`;
  if(o.band==="senior")notes+=`<div class="note info">${T("noteSenior")}</div>`;
  if(o.band==="teen")notes+=`<div class="note info">${T("noteTeen")}</div>`;
  if(o.gender==="female")notes+=`<div class="note info">${T("noteFemale")}</div>`;
  o.conds.forEach(c=>{ const k=COND_NOTES[lang][c]; if(k)notes+=`<div class="note ${k[0]}">⚠️ ${k[1]}</div>`; });
  $("globalNotes").innerHTML=notes;
  $("planGym").innerHTML=renderPlan(o._gym,"gym",estimate(o._gym,o.weight));
  $("planHome").innerHTML=renderPlan(o._home,"home",estimate(o._home,o.weight));
  $("output").classList.remove("hidden"); $("inputCard").classList.add("hidden");
  switchTab("gym"); refreshStats(); checkBadges(false);
}
/* ===================== Tabs ===================== */
let currentTab="gym";
function switchTab(name){
  currentTab=name;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===name));
  $("planGym").classList.toggle("hidden",name!=="gym");
  $("planHome").classList.toggle("hidden",name!=="home");
  $("planWeek").classList.toggle("hidden",name!=="week");
  $("planMe").classList.toggle("hidden",name!=="me");
  if(name==="week"&&lastOpts)$("planWeek").innerHTML=renderWeek("home",lastOpts);
  if(name==="me")$("planMe").innerHTML=renderMe();
}
/* ===================== Apply language to static chrome ===================== */
function applyLang(){
  document.documentElement.lang=lang;
  $("tagline").textContent=T("tagline"); $("badgeLine").textContent=T("badge");
  $("shareBtn").textContent=T("shareApp"); $("langBtn").textContent="🌐 "+T("lang");
  $("lblGender").textContent=T("lblGender"); $("lblAge").textContent=T("lblAge");
  $("lblGoal").textContent=T("lblGoal"); $("lblExp").textContent=T("lblExp");
  $("lblHeight").innerHTML=T("lblHeight"); $("lblWeight").innerHTML=T("lblWeight");
  $("lblConditions").textContent=T("lblConditions");
  const setOpts=(sel,arr)=>{ const os=$(sel).options; for(let i=0;i<os.length;i++) os[i].textContent=arr[i]; };
  setOpts("gender",T("gender")); setOpts("goal",T("goal")); setOpts("level",T("level"));
  [...document.querySelectorAll("#conditions .chip")].forEach(ch=>ch.textContent=T("chips")[ch.dataset.c]);
  $("go").textContent=T("generate");
  $("editBtn").textContent=T("edit"); $("sharePlanBtn").textContent=T("sharePlan"); $("printBtn").textContent=T("print");
  document.querySelectorAll(".tab").forEach(t=>t.textContent=T("tabs")[t.dataset.tab]);
  $("disclaimer").innerHTML=T("disclaimer");
  $("tTitle").textContent=T("tTitle"); $("tStart").textContent=(tHandle?T("tPause"):T("tStart"));
  $("tReset").textContent=T("tReset"); $("timerFab").textContent=T("fab");
  refreshStats();
  if(lastOpts){ generate(); switchTab(currentTab); }
}

/* ===================== Events ===================== */
$("conditions").addEventListener("click",e=>{ const chip=e.target.closest(".chip"); if(!chip)return;
  const c=chip.dataset.c;
  if(c==="none")selected=new Set(["none"]);
  else{ selected.delete("none"); selected.has(c)?selected.delete(c):selected.add(c); if(selected.size===0)selected.add("none"); }
  [...document.querySelectorAll("#conditions .chip")].forEach(ch=>ch.classList.toggle("on",selected.has(ch.dataset.c)));
});
$("go").addEventListener("click",generate);
$("editBtn").addEventListener("click",()=>{ $("inputCard").classList.remove("hidden"); $("output").classList.add("hidden"); window.scrollTo({top:0,behavior:"smooth"}); });
$("printBtn").addEventListener("click",()=>window.print());
$("langBtn").addEventListener("click",()=>{ lang=lang==="en"?"hi":"en"; try{localStorage.setItem("df_lang",lang);}catch(e){} applyLang(); });
document.querySelector(".tabs").addEventListener("click",e=>{ const t=e.target.closest(".tab"); if(t)switchTab(t.dataset.tab); });

$("output").addEventListener("click",e=>{
  // water / protein counters
  const wat=e.target.closest('[data-act="water"]');
  if(wat){ const m=LS.get("df_water",{}); const t=todayStr(); m[t]=Math.max(0,(m[t]||0)+ (+wat.dataset.d)); LS.set("df_water",m); $("planMe").innerHTML=renderMe(); return; }
  const pro=e.target.closest('[data-act="protein"]');
  if(pro){ const m=LS.get("df_protein",{}); const t=todayStr(); m[t]=Math.max(0,(m[t]||0)+ (+pro.dataset.d)); LS.set("df_protein",m); $("planMe").innerHTML=renderMe(); return; }
  // weight add
  if(e.target.id==="wAdd"){ const v=parseFloat($("wInput").value); if(v>0){ const arr=LS.get("df_weights",[]); const t=todayStr();
    const idx=arr.findIndex(d=>d.d===t); if(idx>=0)arr[idx].kg=v; else arr.push({d:t,kg:v}); LS.set("df_weights",arr);
    // also update profile weight so targets refresh
    const p=profile(); p.weight=v; LS.set("df_profile",p); $("weight").value=v; $("planMe").innerHTML=renderMe(); toast("✅ "+v+" kg"); } return; }
  // mark all / reset
  const ma=e.target.closest('[data-act="markall"]'); const rs=e.target.closest('[data-act="reset"]');
  if(ma){ const w=ma.dataset.where; const plan=w==="gym"?lastOpts._gym:lastOpts._home; flatten(plan).forEach(x=>toggleDone(w,x.n,true));
    (w==="gym"?$("planGym"):$("planHome")).innerHTML=renderPlan(plan,w,estimate(plan,lastOpts.weight)); checkBadges(true);
    toast((lang==="hi"?"🎉 वर्कआउट दर्ज! स्ट्रीक: ":"🎉 Workout logged! Streak: ")+computeStreak()); return; }
  if(rs){ const w=rs.dataset.where; const plan=w==="gym"?lastOpts._gym:lastOpts._home; flatten(plan).forEach(x=>toggleDone(w,x.n,false));
    (w==="gym"?$("planGym"):$("planHome")).innerHTML=renderPlan(plan,w,estimate(plan,lastOpts.weight)); return; }
  // exercise tick / tip
  const row=e.target.closest(".ex"); if(!row)return;
  const where=row.closest("#planHome")?"home":"gym"; const name=row.dataset.name;
  if(e.target.closest('[data-act="tip"]')){ row.querySelector(".tip").classList.toggle("open"); return; }
  if(e.target.closest('[data-act="toggle"]')){
    const willOn=!row.classList.contains("done");
    const wasComplete=flatten(where==="gym"?lastOpts._gym:lastOpts._home).every(x=>isDone(where,x.n));
    toggleDone(where,name,willOn); row.classList.toggle("done",willOn);
    const cb=row.querySelector(".cbx"); cb.classList.toggle("on",willOn); cb.textContent=willOn?"✓":"";
    updateProgress(where); checkBadges(true);
    const nowComplete=flatten(where==="gym"?lastOpts._gym:lastOpts._home).every(x=>isDone(where,x.n));
    if(willOn&&!wasComplete&&nowComplete) toast((where==="gym"?"🏟️":"🏠")+" "+T("complete")+" 🔥 "+computeStreak());
  }
});

/* share */
const SHARE_URL=location.origin+location.pathname;
function toast(t){ const el=$("toast"); el.textContent=t; el.classList.add("show"); setTimeout(()=>el.classList.remove("show"),2600); }
$("shareBtn").addEventListener("click",async()=>{ const msg=T("shareMsg");
  if(navigator.share){ try{ await navigator.share({title:"DailyFit",text:msg,url:SHARE_URL}); }catch(e){} }
  else{ try{ await navigator.clipboard.writeText(msg+" "+SHARE_URL); toast(T("copied")); }catch(e){ prompt("Copy:",SHARE_URL); } } });
$("waBtn").addEventListener("click",()=>window.open("https://wa.me/?text="+encodeURIComponent(T("shareMsg")+" "+SHARE_URL),"_blank"));
$("sharePlanBtn").addEventListener("click",async()=>{ if(!lastOpts)return;
  const where=$("planHome").classList.contains("hidden")?(currentTab==="home"?"home":"gym"):"home";
  const w2=currentTab==="home"?"home":"gym"; const plan=w2==="gym"?lastOpts._gym:lastOpts._home;
  const lines=[T("planTitle")(w2==="gym"?(lang==="hi"?"जिम":"Gym"):(lang==="hi"?"घर":"Home"),todayStr())];
  const add=(t,a)=>{ if(a.length){ lines.push(t+":"); a.forEach(x=>lines.push("• "+exName(x)+" — "+x.dose)); } };
  add(T("secTitles").warmup,plan.warmup); add(T("secTitles").lower,plan.lower); add(T("secTitles").upper,plan.upper);
  add(T("secTitles").core,plan.core); add(T("secTitles").cardio,plan.cardio); add(T("secTitles").cool,plan.cool);
  lines.push(""); lines.push(T("makeYours")+" "+SHARE_URL); const txt=lines.join("\n");
  if(navigator.share){ try{ await navigator.share({title:"DailyFit",text:txt}); }catch(e){} }
  else{ try{ await navigator.clipboard.writeText(txt); toast(T("planCopied")); }catch(e){ window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank"); } } });

/* ===================== Rest timer ===================== */
let tDefault=60,tLeft=60,tHandle=null;
function tShow(){ const m=Math.floor(tLeft/60),s=tLeft%60; $("timerDisplay").textContent=m+":"+String(s).padStart(2,"0"); }
function beep(){ try{ const C=window.AudioContext||window.webkitAudioContext; const ctx=new C();
  const o=ctx.createOscillator(),g=ctx.createGain(); o.connect(g); g.connect(ctx.destination);
  o.type="sine"; o.frequency.value=880; g.gain.value=0.001; o.start();
  g.gain.exponentialRampToValueAtTime(0.3,ctx.currentTime+0.05); g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.6); o.stop(ctx.currentTime+0.65);
}catch(e){} }
$("timerFab").addEventListener("click",()=>$("timerCard").classList.toggle("open"));
$("tStart").addEventListener("click",function(){ if(tHandle){ clearInterval(tHandle); tHandle=null; this.textContent=T("tStart"); return; }
  this.textContent=T("tPause");
  tHandle=setInterval(()=>{ tLeft--; tShow(); if(tLeft<=0){ clearInterval(tHandle); tHandle=null; $("tStart").textContent=T("tStart"); tLeft=tDefault; beep(); toast(T("restOver")); setTimeout(tShow,400); } },1000); });
$("tReset").addEventListener("click",()=>{ clearInterval(tHandle); tHandle=null; $("tStart").textContent=T("tStart"); tLeft=tDefault; tShow(); });
$("tMinus").addEventListener("click",()=>{ tDefault=Math.max(15,tDefault-15); tLeft=tDefault; tShow(); });
$("tPlus").addEventListener("click",()=>{ tDefault=Math.min(300,tDefault+15); tLeft=tDefault; tShow(); });

/* ===================== Init ===================== */
applyLang(); tShow(); refreshStats(); checkBadges(false);
if(loadProfile()){ generate(); }
</script>
